name: build

on:
  push:
    branches: [ "main", "master", "develop" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install linters
        run: |
          sudo apt update
          sudo apt install -y cppcheck clang-tidy cmake ninja-build libboost-all-dev libssl-dev libsqlite3-dev

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability --error-exitcode=1 --inline-suppr --quiet src include

      - name: Configure for clang-tidy
        run: cmake -S . -B build-lint -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy (core module)
        run: |
          find src/core -name "*.cpp" -print0 | xargs -0 -r clang-tidy -p build-lint -checks='-*,bugprone-*,performance-*,security-*'

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libboost-all-dev libssl-dev libsqlite3-dev doxygen graphviz

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y doxygen.install graphviz ninja
          vcpkg install boost-filesystem boost-system boost-program-options openssl sqlite3 --triplet x64-windows

      - name: Configure
        if: runner.os == 'Linux'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DZIBBY_ENABLE_TESTS=ON -G Ninja

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DZIBBY_ENABLE_TESTS=ON -G Ninja -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

      - name: Package
        if: runner.os == 'Windows'
        run: cpack --config build/CPackConfig.cmake -C ${{ matrix.build_type }}

      - name: Package
        if: runner.os == 'Linux'
        run: cpack --config build/CPackConfig.cmake -C ${{ matrix.build_type }}

      - name: Generate checksums (Linux)
        if: runner.os == 'Linux'
        run: bash scripts/generate_checksums.sh installers

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/generate_checksums.ps1 -ArtifactsDir installers

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zibby-${{ runner.os }}-${{ matrix.build_type }}
          path: |
            installers/*

  prerelease:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
